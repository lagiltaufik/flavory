name: flavory
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  flutter_dotenv: ^6.0.1
  drift: ^2.32.1
  path: ^1.9.1
  drift_flutter: ^0.3.0
  fluttertoast: ^9.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  go_router: ^17.2.3
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  fl_chart: ^1.2.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.14.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/icon/icon.png"


flutter:

  uses-material-design: true

  assets:
   - .env
   - assets/images/
   - assets/icons/

